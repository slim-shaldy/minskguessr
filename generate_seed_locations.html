<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Minsk Location Validator</title>
<style>
  body{font-family:monospace;background:#111;color:#eee;padding:20px;max-width:800px;margin:0 auto;}
  button{background:#6b21a8;color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:14px;margin:8px 4px;}
  button:hover{background:#7c3aed;}
  button:disabled{background:#333;cursor:default;}
  #log{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:16px;height:300px;overflow-y:auto;font-size:12px;margin:12px 0;}
  .ok{color:#4ade80;} .err{color:#f87171;} .info{color:#60a5fa;} .warn{color:#fbbf24;}
  .stats{display:flex;gap:20px;margin:12px 0;font-size:14px;}
  .stat{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:10px 16px;}
  .stat span{color:#a78bfa;font-size:20px;font-weight:700;}
  progress{width:100%;height:12px;border-radius:6px;margin:8px 0;}
</style>
</head>
<body>
<h2>🗺️ Minsk Location Validator</h2>
<p>Проверяет все точки из locations.json через StreetView API — оставляет только те где есть уличная панорама.</p>

<button id="btn-start" onclick="startValidation()">▶ Проверить locations.json</button>
<button onclick="exportResult()" id="btn-export">💾 Скачать validated_locations.json</button>
<button onclick="clearLog()">🗑 Лог</button>

<div class="stats">
  <div class="stat">Всего: <span id="cnt-total">—</span></div>
  <div class="stat">✓ Найдено: <span id="cnt-ok">0</span></div>
  <div class="stat">✗ Нет панорамы: <span id="cnt-err">0</span></div>
  <div class="stat">Осталось: <span id="cnt-left">—</span></div>
</div>
<progress id="prog" value="0" max="100"></progress>

<div id="log"></div>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCLsKut8sS9VuTqFkLtmhmF7tz5_i7ZJlA&libraries=streetView"></script>
<script>
var results = [];
var svService;
var running = false;

function log(msg, cls){
  var d=document.getElementById('log');
  var s=document.createElement('div');
  s.className=cls||'info';
  s.textContent=msg;
  d.appendChild(s);
  d.scrollTop=d.scrollHeight;
}
function clearLog(){document.getElementById('log').innerHTML='';}

function checkPoint(point){
  return new Promise(function(resolve){
    var latlng=new google.maps.LatLng(point.lat, point.lng);
    // сначала OUTDOOR radius 80м
    svService.getPanorama({location:latlng, radius:80, source:google.maps.StreetViewSource.OUTDOOR}, function(data, status){
      if(status===google.maps.StreetViewStatus.OK){
        var loc=data.location;
        resolve({
          id:0,
          lat:loc.latLng.lat(),
          lng:loc.latLng.lng(),
          panoId:loc.pano,
          name:point.name||''
        });
      } else {
        // fallback OUTDOOR radius 150м
        svService.getPanorama({location:latlng, radius:150, source:google.maps.StreetViewSource.OUTDOOR}, function(d2, s2){
          if(s2===google.maps.StreetViewStatus.OK){
            var loc=d2.location;
            resolve({
              id:0,
              lat:loc.latLng.lat(),
              lng:loc.latLng.lng(),
              panoId:loc.pano,
              name:point.name||''
            });
          } else {
            resolve(null);
          }
        });
      }
    });
  });
}

async function startValidation(){
  if(running) return;
  running=true;
  document.getElementById('btn-start').disabled=true;
  svService=new google.maps.StreetViewService();
  results=[];

  // Загружаем locations.json
  log('Загружаем locations.json...', 'info');
  var resp = await fetch('locations.json?v='+Date.now());
  var points = await resp.json();
  var total = points.length;
  document.getElementById('cnt-total').textContent=total;
  log('Загружено '+total+' точек. Начинаем проверку...', 'info');

  var ok=0, err=0;

  // Дедупликация по panoId
  var seenPanos = new Set();

  // 4 воркера параллельно
  var WORKERS = 4;
  var idx = 0;

  async function worker(){
    while(idx < total){
      var i = idx++;
      var pt = points[i];
      var res = await checkPoint(pt);
      if(res){
        // проверяем дубль по panoId
        if(!seenPanos.has(res.panoId)){
          seenPanos.add(res.panoId);
          results.push(res);
          ok++;
          if(ok % 10 === 0) log('✓ ['+ok+'] '+res.name+' ('+res.lat.toFixed(4)+','+res.lng.toFixed(4)+')', 'ok');
        } else {
          // дубль panoId — пропускаем
          err++;
        }
      } else {
        err++;
        if(err % 20 === 0) log('✗ нет панорамы: '+(pt.name||pt.lat+','+pt.lng), 'err');
      }
      document.getElementById('cnt-ok').textContent=ok;
      document.getElementById('cnt-err').textContent=err;
      document.getElementById('cnt-left').textContent=(total-i-1);
      document.getElementById('prog').value=Math.round((i+1)/total*100);
    }
  }

  // Запускаем воркеры
  var workers = [];
  for(var w=0; w<WORKERS; w++) workers.push(worker());
  await Promise.all(workers);

  // Перенумеровываем
  for(var j=0; j<results.length; j++) results[j].id = j+1;

  log('✅ Готово! Найдено '+results.length+' уличных точек из '+total, 'ok');
  running=false;
  document.getElementById('btn-start').disabled=false;
}

function exportResult(){
  if(!results.length){alert('Сначала запустите проверку');return;}
  var blob=new Blob([JSON.stringify(results,null,2)],{type:'application/json'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='validated_locations.json';
  a.click();
}
</script>
</body>
</html>
