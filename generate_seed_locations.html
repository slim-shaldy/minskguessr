  button:hover{background:#7c3aed;}
  #log{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:16px;height:300px;overflow-y:auto;font-size:12px;margin:12px 0;}
  #output{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:16px;font-size:11px;max-height:200px;overflow-y:auto;}
  .ok{color:#4ade80;} .err{color:#f87171;} .info{color:#60a5fa;}
</style>

<body>
<h2>🗺️ Minsk Seed Location Generator</h2>
<p>Генерирует уличные панорамы по заданным seed-точкам Минска. Результат — добавить к существующему locations.json.</p>
<button onclick="startGenerate()">▶ Запустить генерацию</button>
<button onclick="exportResult()">💾 Скачать JSON</button>
<button onclick="clearLog()">🗑 Очистить</button>
<div id="log"></div>
<div><strong>Найдено точек: <span id="count">0</span></strong></div>
<div id="output"></div>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCLsKut8sS9VuTqFkLtmhmF7tz5_i7ZJlA&libraries=streetView"></script>
<script>
// Seed-точки — известные места и улицы Минска

var results = [];
var svService;

function log(msg, cls){
  var d=document.getElementById('log');
  var s=document.createElement('div');
  s.className=cls||'info';
  s.textContent=new Date().toLocaleTimeString()+' — '+msg;
  d.appendChild(s);
  d.scrollTop=d.scrollHeight;
}

function clearLog(){document.getElementById('log').innerHTML='';}

function updateCount(){document.getElementById('count').textContent=results.length;}

async function checkSeed(seed){
  return new Promise(function(resolve){
    var latlng=new google.maps.LatLng(seed.lat,seed.lng);
    // сначала OUTDOOR radius 100
    svService.getPanorama({location:latlng,radius:100,source:google.maps.StreetViewSource.OUTDOOR},function(data,status){
      if(status===google.maps.StreetViewStatus.OK){
        var loc=data.location;
        results.push({
          id:results.length+1,
          lat:loc.latLng.lat(),
          lng:loc.latLng.lng(),
          panoId:loc.pano,
          name:seed.name
        });
        log('✓ '+seed.name+' → '+loc.latLng.lat().toFixed(5)+','+loc.latLng.lng().toFixed(5),'ok');
        resolve(true);
      } else {
        // fallback radius 200
        svService.getPanorama({location:latlng,radius:200,source:google.maps.StreetViewSource.OUTDOOR},function(d2,s2){
          if(s2===google.maps.StreetViewStatus.OK){
            var loc=d2.location;
            results.push({
              id:results.length+1,
              lat:loc.latLng.lat(),
              lng:loc.latLng.lng(),
              panoId:loc.pano,
              name:seed.name
            });
            log('✓ '+seed.name+' (fallback 200m)','ok');
            resolve(true);
          } else {
            log('✗ '+seed.name+' — нет панорамы','err');
            resolve(false);
          }
        });
      }
    });
  });
}

async function startGenerate(){
  svService=new google.maps.StreetViewService();
  results=[];
  log('Начинаем генерацию '+SEEDS.length+' seed-точек...');
  for(var i=0;i<SEEDS.length;i++){
    await checkSeed(SEEDS[i]);
    updateCount();
    await new Promise(r=>setTimeout(r,150));
  }
  log('Готово! Найдено '+results.length+' точек из '+SEEDS.length,'ok');
  document.getElementById('output').textContent=JSON.stringify(results,null,2);
}

function exportResult(){
  if(!results.length){alert('Сначала запустите генерацию');return;}
  var blob=new Blob([JSON.stringify(results,null,2)],{type:'application/json'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='seed_locations.json';
  a.click();
}
</script>
</body>
</html>
