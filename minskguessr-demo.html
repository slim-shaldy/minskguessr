<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MinskGuessr</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700&family=Inter:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0e0f11;--surface:#161819;--surface2:#1f2124;--border:rgba(255,255,255,0.08);--accent:#d4f04e;--text:#f0f0ee;--text-dim:#7a7a72;--red:#f05a4f;--green:#4fd88a;--radius:12px}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10}
.logo{font-family:'Unbounded',sans-serif;font-size:16px;font-weight:700;color:var(--accent)}
.logo span{color:var(--text-dim);font-weight:400}
.round-indicator{display:flex;gap:6px;align-items:center}
.round-dot{width:8px;height:8px;border-radius:50%;background:var(--border);border:1.5px solid var(--text-dim);transition:all 0.3s}
.round-dot.active{background:var(--accent);border-color:var(--accent)}
.round-dot.done{background:var(--text-dim);border-color:var(--text-dim)}
.score-display{font-family:'Unbounded',sans-serif;font-size:14px;color:var(--text-dim)}
.score-display span{color:var(--accent);font-size:16px}
.game-area{flex:1;position:relative;overflow:hidden}
#panorama{width:100%;height:100%}
.map-panel{position:absolute;bottom:20px;right:20px;width:340px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.5);z-index:100;transition:width 0.3s}
.map-header{padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--text-dim);cursor:pointer;user-select:none}
.map-hint{font-size:11px;color:var(--text-dim)}
.map-hint.placed{color:var(--green)}
#map{width:100%;height:220px;cursor:crosshair}
.map-footer{padding:10px 14px;display:flex;gap:8px;align-items:center;background:var(--surface2);border-top:1px solid var(--border)}
.btn{font-family:'Unbounded',sans-serif;font-size:11px;font-weight:700;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;transition:all 0.15s}
.btn-primary{background:var(--accent);color:#0e0f11;flex:1}
.btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-primary:disabled{background:var(--surface2);color:var(--text-dim);cursor:not-allowed;transform:none;border:1px solid var(--border)}
.btn-secondary{background:transparent;color:var(--text-dim);border:1px solid var(--border);padding:8px 10px}
.result-overlay{position:absolute;inset:0;background:rgba(14,15,17,0.92);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity 0.4s}
.result-overlay.visible{opacity:1;pointer-events:all}
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px 40px;text-align:center;max-width:420px;width:90%;transform:translateY(20px);transition:transform 0.4s;box-shadow:0 24px 80px rgba(0,0,0,0.6)}
.result-overlay.visible .result-card{transform:translateY(0)}
.result-map-container{width:100%;height:200px;border-radius:10px;overflow:hidden;margin-bottom:20px;border:1px solid var(--border)}
#result-map{width:100%;height:100%}
.score-big{font-family:'Unbounded',sans-serif;font-size:52px;font-weight:700;line-height:1;margin-bottom:4px}
.score-big.great{color:var(--accent)}.score-big.good{color:var(--green)}.score-big.ok{color:#f0a04f}.score-big.bad{color:var(--red)}
.score-label{font-size:13px;color:var(--text-dim);margin-bottom:16px}
.dist-label{font-size:14px;color:var(--text-dim);margin-bottom:24px}
.dist-label strong{color:var(--text);font-weight:500}
.loading-screen{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:300;transition:opacity 0.5s}
.loading-screen.hidden{opacity:0;pointer-events:none}
.loading-logo{font-family:'Unbounded',sans-serif;font-size:28px;font-weight:700;color:var(--accent)}
.loading-sub{font-size:13px;color:var(--text-dim)}
.loading-dots{display:flex;gap:6px}
.loading-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:bounce 1.4s infinite ease-in-out}
.loading-dot:nth-child(2){animation-delay:0.2s}.loading-dot:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,80%,100%{transform:scale(0.6);opacity:0.4}40%{transform:scale(1);opacity:1}}
</style>
</head>
<body>
<div class="header">
  <div class="logo">Minsk<span>Guessr</span></div>
  <div class="round-indicator" id="round-dots"></div>
  <div class="score-display">&#x41E;&#x447;&#x43A;&#x438;: <span id="total-score">0</span></div>
</div>
<div class="game-area">
  <div class="loading-screen" id="loading-screen">
    <div class="loading-logo">MinskGuessr</div>
    <div class="loading-sub" id="loading-sub">&#x417;&#x430;&#x433;&#x440;&#x443;&#x436;&#x430;&#x435;&#x43C;...</div>
    <div class="loading-dots"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>
  </div>
  <div id="panorama"></div>
  <div class="map-panel" id="map-panel">
    <div class="map-header" onclick="toggleMap()">
      <span>&#x1F4CD; &#x413;&#x434;&#x435; &#x44D;&#x442;&#x43E;?</span>
      <span class="map-hint" id="map-hint">&#x41A;&#x43B;&#x438;&#x43A;&#x43D;&#x438; &#x43D;&#x430; &#x43A;&#x430;&#x440;&#x442;&#x443;</span>
    </div>
    <div id="map"></div>
    <div class="map-footer">
      <button class="btn btn-secondary" onclick="clearGuess()">&#x2715;</button>
      <button class="btn btn-primary" id="guess-btn" disabled onclick="submitGuess()">&#x41F;&#x43E;&#x434;&#x442;&#x432;&#x435;&#x440;&#x434;&#x438;&#x442;&#x44C; &#x2192;</button>
    </div>
  </div>
  <div class="result-overlay" id="result-overlay">
    <div class="result-card" id="result-card">
      <div class="result-map-container"><div id="result-map"></div></div>
      <div class="score-big" id="round-score">0</div>
      <div class="score-label" id="score-label">&#x43E;&#x447;&#x43A;&#x43E;&#x432;</div>
      <div class="dist-label" id="dist-label">&#x420;&#x430;&#x441;&#x441;&#x442;&#x43E;&#x44F;&#x43D;&#x438;&#x435;: <strong>&#x2014;</strong></div>
      <button class="btn btn-primary" style="width:100%" onclick="nextRound()">&#x421;&#x43B;&#x435;&#x434;&#x443;&#x44E;&#x449;&#x438;&#x439; &#x440;&#x430;&#x443;&#x43D;&#x434; &#x2192;</button>
    </div>
  </div>
</div>
<script>
var ROUNDS = 5;
var LOCATIONS = [];
var state = {gameLocations:[],currentRound:0,totalScore:0,guessLatLng:null,svService:null,guessMarker:null,guessMap:null,resultMap:null,_resultMarkers:[],_resultLine:null};

// Load locations.json from same directory
fetch('locations.json')
  .then(function(r){ return r.json(); })
  .then(function(data){
    LOCATIONS = data;
    console.log('Loaded', LOCATIONS.length, 'locations');
  })
  .catch(function(){
    console.warn('locations.json not found, using fallback');
    LOCATIONS = [
      {id:1,lat:53.9045,lng:27.5615,panoId:null},
      {id:2,lat:53.8994,lng:27.5589,panoId:null},
      {id:3,lat:53.9041,lng:27.5652,panoId:null},
      {id:4,lat:53.9083,lng:27.5495,panoId:null},
      {id:5,lat:53.8952,lng:27.5613,panoId:null},
      {id:6,lat:53.9037,lng:27.5785,panoId:null},
      {id:7,lat:53.8889,lng:27.5490,panoId:null},
      {id:8,lat:53.8961,lng:27.5432,panoId:null},
      {id:9,lat:53.9190,lng:27.5668,panoId:null},
      {id:10,lat:53.9310,lng:27.5900,panoId:null}
    ];
  });

function initMap() {
  state.svService = new google.maps.StreetViewService();
  state.guessMap = new google.maps.Map(document.getElementById('map'), {
    center:{lat:53.904,lng:27.562}, zoom:10,
    disableDefaultUI:true, zoomControl:true,
    styles:[
      {elementType:'geometry',stylers:[{color:'#1a1c1e'}]},
      {elementType:'labels.text.fill',stylers:[{color:'#7a7a72'}]},
      {elementType:'labels.text.stroke',stylers:[{color:'#0e0f11'}]},
      {featureType:'road',elementType:'geometry',stylers:[{color:'#2a2d30'}]},
      {featureType:'water',elementType:'geometry',stylers:[{color:'#0d1117'}]},
      {featureType:'poi',stylers:[{visibility:'off'}]},
      {featureType:'transit',stylers:[{visibility:'off'}]}
    ]
  });
  state.guessMap.addListener('click', function(e){ placeGuessMarker(e.latLng); });
  startGame();
}

function startGame() {
  if (!LOCATIONS.length) { setTimeout(startGame, 200); return; }
  var shuffled = LOCATIONS.slice().sort(function(){return Math.random()-0.5;});
  state.gameLocations = shuffled.slice(0, ROUNDS);
  state.currentRound = 0;
  state.totalScore = 0;
  document.getElementById('total-score').textContent = '0';
  buildRoundDots();
  startRound();
}

function startRound() {
  updateRoundDots();
  showLoading('&#x417;&#x430;&#x433;&#x440;&#x443;&#x436;&#x430;&#x435;&#x43C; &#x43F;&#x430;&#x43D;&#x43E;&#x440;&#x430;&#x43C;&#x443;...');
  clearGuess();
  var loc = state.gameLocations[state.currentRound];
  var loadPano = function(panoId) {
    document.getElementById('panorama').innerHTML = '';
    new google.maps.StreetViewPanorama(document.getElementById('panorama'), {
      pano: panoId,
      disableDefaultUI:false, zoomControl:true,
      addressControl:false, fullscreenControl:false,
      motionTracking:false, linksControl:false
    });
    hideLoading();
  };
  if (loc.panoId) {
    loadPano(loc.panoId);
  } else {
    state.svService.getPanorama({location:{lat:loc.lat,lng:loc.lng},radius:80,source:google.maps.StreetViewSource.OUTDOOR}, function(d,s){
      if (s==='OK') loadPano(d.location.pano);
      else state.svService.getPanorama({location:{lat:loc.lat,lng:loc.lng},radius:150}, function(d2,s2){
        if (s2==='OK') loadPano(d2.location.pano); else showNoPano();
      });
    });
  }
}

function showNoPano() {
  hideLoading();
  document.getElementById('panorama').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;background:var(--surface);flex-direction:column;gap:10px;color:var(--text-dim)"><div style="font-size:40px">&#x1F4F7;</div><div>&#x41F;&#x430;&#x43D;&#x43E;&#x440;&#x430;&#x43C;&#x430; &#x43D;&#x435;&#x434;&#x43E;&#x441;&#x442;&#x443;&#x43F;&#x43D;&#x430;</div><div style="font-size:12px;opacity:0.6">&#x41F;&#x43E;&#x441;&#x442;&#x430;&#x432;&#x44C; &#x43C;&#x435;&#x442;&#x43A;&#x443; &#x43D;&#x430;&#x443;&#x433;&#x430;&#x434;</div></div>';
}

function placeGuessMarker(latLng) {
  state.guessLatLng = latLng;
  if (state.guessMarker) state.guessMarker.setMap(null);
  state.guessMarker = new google.maps.Marker({
    position:latLng, map:state.guessMap,
    icon:{path:google.maps.SymbolPath.CIRCLE,scale:8,fillColor:'#f05a4f',fillOpacity:1,strokeColor:'#fff',strokeWeight:2}
  });
  document.getElementById('guess-btn').disabled = false;
  document.getElementById('map-hint').textContent = '&#x41C;&#x435;&#x442;&#x43A;&#x430; &#x43F;&#x43E;&#x441;&#x442;&#x430;&#x432;&#x43B;&#x435;&#x43D;&#x430; &#x2713;';
  document.getElementById('map-hint').className = 'map-hint placed';
}

function clearGuess() {
  if (state.guessMarker){state.guessMarker.setMap(null);state.guessMarker=null;}
  state.guessLatLng=null;
  document.getElementById('guess-btn').disabled=true;
  document.getElementById('map-hint').textContent='&#x41A;&#x43B;&#x438;&#x43A;&#x43D;&#x438; &#x43D;&#x430; &#x43A;&#x430;&#x440;&#x442;&#x443;';
  document.getElementById('map-hint').className='map-hint';
}

function submitGuess() {
  if (!state.guessLatLng) return;
  var loc = state.gameLocations[state.currentRound];
  var dist = haversine(state.guessLatLng.lat(), state.guessLatLng.lng(), loc.lat, loc.lng);
  var score = Math.max(0, Math.round(5000*Math.exp(-dist/0.35)));
  state.totalScore += score;
  document.getElementById('total-score').textContent = state.totalScore.toLocaleString('ru');
  showResult(loc, dist, score);
}

function showResult(loc, distKm, score) {
  document.getElementById('round-score').textContent = score.toLocaleString('ru');
  document.getElementById('round-score').className = 'score-big '+(score>=4000?'great':score>=2500?'good':score>=1000?'ok':'bad');
  document.getElementById('score-label').textContent = '&#x43E;&#x447;&#x43A;&#x43E;&#x432; &#x437;&#x430; &#x440;&#x430;&#x443;&#x43D;&#x434;';
  var distText = distKm<1 ? Math.round(distKm*1000)+' &#x43C;' : distKm.toFixed(2)+' &#x43A;&#x43C;';
  document.getElementById('dist-label').innerHTML = '&#x420;&#x430;&#x441;&#x441;&#x442;&#x43E;&#x44F;&#x43D;&#x438;&#x435;: <strong>'+distText+'</strong>';
  if (!state.resultMap) {
    state.resultMap = new google.maps.Map(document.getElementById('result-map'), {
      disableDefaultUI:true,
      styles:[
        {elementType:'geometry',stylers:[{color:'#1a1c1e'}]},
        {elementType:'labels.text.fill',stylers:[{color:'#7a7a72'}]},
        {featureType:'road',elementType:'geometry',stylers:[{color:'#2a2d30'}]},
        {featureType:'water',elementType:'geometry',stylers:[{color:'#0d1117'}]},
        {featureType:'poi',stylers:[{visibility:'off'}]}
      ]
    });
  }
  var realPos={lat:loc.lat,lng:loc.lng};
  var guessPos={lat:state.guessLatLng.lat(),lng:state.guessLatLng.lng()};
  state._resultMarkers.forEach(function(m){m.setMap(null);});
  if (state._resultLine) state._resultLine.setMap(null);
  state._resultMarkers = [
    new google.maps.Marker({position:realPos,map:state.resultMap,icon:{path:google.maps.SymbolPath.CIRCLE,scale:9,fillColor:'#4fd88a',fillOpacity:1,strokeColor:'#fff',strokeWeight:2}}),
    new google.maps.Marker({position:guessPos,map:state.resultMap,icon:{path:google.maps.SymbolPath.CIRCLE,scale:9,fillColor:'#f05a4f',fillOpacity:1,strokeColor:'#fff',strokeWeight:2}})
  ];
  state._resultLine = new google.maps.Polyline({path:[guessPos,realPos],map:state.resultMap,strokeColor:'#d4f04e',strokeOpacity:0.8,strokeWeight:2});
  var bounds = new google.maps.LatLngBounds();
  bounds.extend(realPos); bounds.extend(guessPos);
  state.resultMap.fitBounds(bounds,30);
  document.getElementById('result-overlay').classList.add('visible');
}

function nextRound() {
  document.getElementById('result-overlay').classList.remove('visible');
  state.currentRound++;
  if (state.currentRound>=ROUNDS){showFinalScreen();return;}
  startRound();
}

function showFinalScreen() {
  document.getElementById('result-card').innerHTML =
    '<div style="font-family:Unbounded,sans-serif;font-size:14px;color:var(--text-dim);margin-bottom:8px">&#x418;&#x422;&#x41E;&#x413;&#x41E;</div>'
    +'<div class="score-big great">'+state.totalScore.toLocaleString('ru')+'</div>'
    +'<div class="score-label" style="margin-bottom:24px">&#x438;&#x437; '+(ROUNDS*5000).toLocaleString('ru')+' &#x432;&#x43E;&#x437;&#x43C;&#x43E;&#x436;&#x43D;&#x44B;&#x445;</div>'
    +'<div class="dist-label" style="margin-bottom:24px">'+getComment(state.totalScore/(ROUNDS*5000))+'</div>'
    +'<button class="btn btn-primary" style="width:100%" onclick="location.reload()">&#x418;&#x433;&#x440;&#x430;&#x442;&#x44C; &#x441;&#x43D;&#x43E;&#x432;&#x430; &#x2192;</button>';
  document.getElementById('result-overlay').classList.add('visible');
}

function getComment(r){
  if(r>=0.9)return'&#x1F3C6; &#x41D;&#x430;&#x441;&#x442;&#x43E;&#x44F;&#x449;&#x438;&#x439; &#x43C;&#x438;&#x43D;&#x447;&#x430;&#x43D;&#x438;&#x43D;!';
  if(r>=0.7)return'&#x1F5FA;&#xFE0F; &#x417;&#x43D;&#x430;&#x435;&#x448;&#x44C; &#x433;&#x43E;&#x440;&#x43E;&#x434; &#x43D;&#x435;&#x43F;&#x43B;&#x43E;&#x445;&#x43E;';
  if(r>=0.4)return'&#x1F68C; &#x41D;&#x443;&#x436;&#x43D;&#x43E; &#x431;&#x43E;&#x43B;&#x44C;&#x448;&#x435; &#x433;&#x443;&#x43B;&#x44F;&#x442;&#x44C;';
  return'&#x1F30D; &#x422;&#x44B; &#x442;&#x43E;&#x447;&#x43D;&#x43E; &#x431;&#x44B;&#x43B; &#x432; &#x41C;&#x438;&#x43D;&#x441;&#x43A;&#x435;?';
}

function haversine(lat1,lng1,lat2,lng2){
  var R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  var a=Math.pow(Math.sin(dLat/2),2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.pow(Math.sin(dLng/2),2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function showLoading(msg){document.getElementById('loading-sub').innerHTML=msg;document.getElementById('loading-screen').classList.remove('hidden');}
function hideLoading(){setTimeout(function(){document.getElementById('loading-screen').classList.add('hidden');},400);}
function toggleMap(){var p=document.getElementById('map-panel');p.style.width=p.style.width==='480px'?'340px':'480px';}

function buildRoundDots(){
  var c=document.getElementById('round-dots');c.innerHTML='';
  for(var i=0;i<ROUNDS;i++){var d=document.createElement('div');d.className='round-dot'+(i===0?' active':'');d.id='dot-'+i;c.appendChild(d);}
}
function updateRoundDots(){
  for(var i=0;i<ROUNDS;i++){var d=document.getElementById('dot-'+i);if(!d)continue;d.className='round-dot';if(i<state.currentRound)d.classList.add('done');else if(i===state.currentRound)d.classList.add('active');}
}
</script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCLsKut8hOnE1Pc_d6xjsZ7xMpVrsFScPc&callback=initMap&libraries=streetView" async defer></script>
</body>
</html>
