<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MinskGuessr — Мультиплеер</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Inter:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf9f7;--surface:#ffffff;--surface2:#f3f2ef;--border:rgba(0,0,0,0.1);
  --text:#1a1a1a;--text-dim:#888880;--radius:12px;
  --pride1:#ff3c5f;--pride2:#ff8c00;--pride3:#f5c800;--pride4:#00b86e;--pride5:#0077ff;--pride6:#9b30ff;
  --red:#ff3c5f;--green:#00b86e;--orange:#ff8c00;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}
.rainbow-line{height:4px;background:linear-gradient(90deg,var(--pride1),var(--pride2),var(--pride3),var(--pride4),var(--pride5),var(--pride6));flex-shrink:0}
.header{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10;gap:12px}
.logo{font-family:'Unbounded',sans-serif;font-size:15px;font-weight:900;background:linear-gradient(90deg,var(--pride1),var(--pride2),var(--pride3),var(--pride4),var(--pride5),var(--pride6));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-0.5px}
.round-indicator{display:flex;gap:5px;align-items:center}
.round-dot{width:7px;height:7px;border-radius:50%;background:var(--border);border:1.5px solid #ccc;transition:all 0.3s}
.round-dot.active{background:var(--pride5);border-color:var(--pride5)}
.round-dot.done{background:#ccc;border-color:#ccc}
.header-right{display:flex;align-items:center;gap:16px}
.score-display{font-family:'Unbounded',sans-serif;font-size:13px;color:var(--text-dim)}
.score-display span{color:var(--pride5);font-size:15px}
.timer-wrap{display:flex;align-items:center;gap:8px}
.timer-box{font-family:'Unbounded',sans-serif;font-size:20px;font-weight:700;padding:6px 14px;border-radius:10px;background:var(--surface2);border:2px solid var(--border);min-width:68px;text-align:center;transition:all 0.4s}
.timer-box.t1{color:var(--green);border-color:rgba(0,184,110,0.4);background:rgba(0,184,110,0.07)}
.timer-box.t2{color:var(--orange);border-color:rgba(255,140,0,0.4);background:rgba(255,140,0,0.07)}
.timer-box.t3{color:var(--red);border-color:rgba(255,60,95,0.4);background:rgba(255,60,95,0.07)}
.timer-box.t4{color:var(--text-dim);border-color:var(--border)}
.mult-badge{font-family:'Unbounded',sans-serif;font-size:15px;font-weight:700;padding:5px 12px;border-radius:8px;background:var(--surface2);border:2px solid var(--border);transition:all 0.4s}
.mult-badge.m1{color:var(--green);background:rgba(0,184,110,0.08);border-color:rgba(0,184,110,0.35)}
.mult-badge.m09{color:var(--orange);background:rgba(255,140,0,0.08);border-color:rgba(255,140,0,0.35)}
.mult-badge.m08{color:var(--red);background:rgba(255,60,95,0.08);border-color:rgba(255,60,95,0.35)}
.mult-badge.m07{color:var(--text-dim)}
.game-area{flex:1;position:relative;overflow:hidden}
#panorama{width:100%;height:100%}
.map-panel{position:absolute;bottom:20px;right:20px;width:340px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.12);z-index:100;transition:width 0.25s ease,height 0.25s ease}
.map-panel:hover{width:612px}
.map-panel:hover #map{height:396px}
.map-header{padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--text-dim);cursor:pointer;user-select:none}
.map-hint{font-size:11px;color:var(--text-dim)}
.map-hint.placed{color:var(--green)}
#map{width:100%;height:220px;cursor:crosshair;transition:height 0.25s ease}
.map-footer{padding:10px 14px;display:flex;gap:8px;align-items:center;background:var(--surface2);border-top:1px solid var(--border)}
.btn{font-family:'Unbounded',sans-serif;font-size:11px;font-weight:700;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;transition:all 0.15s}
.btn-primary{background:linear-gradient(135deg,var(--pride5),var(--pride6));color:#fff;flex:1}
.btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0)}
.btn-primary:disabled{background:var(--surface2);color:var(--text-dim);cursor:not-allowed;transform:none;border:1px solid var(--border)}
.btn-secondary{background:transparent;color:var(--text-dim);border:1px solid var(--border);padding:8px 10px}
.btn-lg{font-size:14px;padding:14px 32px;border-radius:12px}
.overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity 0.4s}
.overlay.visible{opacity:1;pointer-events:all}
.overlay-bg{background:rgba(250,249,247,0.93);backdrop-filter:blur(8px)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px 44px;max-width:520px;width:90%;box-shadow:0 24px 80px rgba(0,0,0,0.1);max-height:90vh;overflow-y:auto}
.card-logo{font-family:'Unbounded',sans-serif;font-size:28px;font-weight:900;background:linear-gradient(90deg,var(--pride1),var(--pride2),var(--pride3),var(--pride4),var(--pride5),var(--pride6));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;line-height:1.2}
.card-sub{font-size:13px;color:var(--text-dim);margin-bottom:24px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:6px;font-weight:500}
.form-input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:'Inter',sans-serif;background:var(--surface2);outline:none;transition:border-color 0.2s}
.form-input:focus{border-color:var(--pride5)}
.form-row{display:flex;gap:12px}
.form-row>*{flex:1}
select.form-input{cursor:pointer}
.mode-btn{background:var(--surface2);color:var(--text-dim)}
.mode-btn.active{background:linear-gradient(135deg,var(--pride5),var(--pride6));color:#fff}
.player-list{display:flex;flex-direction:column;gap:6px;margin:16px 0}
.player-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface2);border-radius:8px;border:1px solid var(--border);font-size:13px}
.player-item .crown{color:var(--pride3)}
.player-item .nick{font-weight:500}
.room-code-big{font-family:'Unbounded',sans-serif;font-size:32px;font-weight:900;letter-spacing:4px;color:var(--pride5);text-align:center;margin:12px 0}
.scoreboard{width:100%;margin:12px 0}
.scoreboard th{font-size:11px;color:var(--text-dim);text-align:left;padding:6px 8px;border-bottom:1px solid var(--border);font-weight:500}
.scoreboard td{padding:8px;border-bottom:1px solid var(--border);font-size:13px}
.scoreboard tr:last-child td{border-bottom:none}
.scoreboard .rank{font-family:'Unbounded',sans-serif;font-weight:900;color:var(--pride5)}
.scoreboard .score-cell{font-family:'Unbounded',sans-serif;font-weight:700}
.result-map-container{width:100%;height:200px;border-radius:10px;overflow:hidden;margin-bottom:12px;border:1px solid var(--border)}
#result-map{width:100%;height:100%}
.players-guessed{position:absolute;top:14px;right:14px;z-index:50;display:flex;gap:6px;flex-wrap:wrap}
.guessed-chip{padding:4px 10px;border-radius:20px;font-size:11px;font-family:'Unbounded',sans-serif;font-weight:700;background:rgba(0,184,110,0.15);color:var(--green);border:1px solid rgba(0,184,110,0.3);backdrop-filter:blur(6px)}
.guessed-chip.waiting{background:rgba(0,0,0,0.05);color:var(--text-dim);border-color:var(--border)}
.verdict-banner{display:inline-block;font-family:'Unbounded',sans-serif;font-size:22px;font-weight:900;padding:10px 24px;border-radius:40px;margin-bottom:12px;letter-spacing:0.5px}
.verdict-gay{background:linear-gradient(135deg,var(--pride1),var(--pride2),var(--pride3),var(--pride4),var(--pride5),var(--pride6));color:#fff}
.verdict-norm{background:#e8f5e9;color:#2e7d32;border:2px solid #a5d6a7}
.verdict-good{background:#fff8e1;color:#e65100;border:2px solid #ffcc80}
.verdict-slonyara{background:linear-gradient(135deg,var(--pride5),var(--pride6));color:#fff;box-shadow:0 4px 20px rgba(0,119,255,0.3)}
.score-big{font-family:'Unbounded',sans-serif;font-size:48px;font-weight:900;line-height:1;margin-bottom:4px}
.score-big.great{background:linear-gradient(135deg,var(--pride4),var(--pride5));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.score-big.good{color:var(--green)}
.score-big.ok{color:var(--orange)}
.score-big.bad{color:var(--red)}
.loading-screen{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:300;transition:opacity 0.5s}
.loading-screen.hidden{opacity:0;pointer-events:none}
.loading-logo{font-family:'Unbounded',sans-serif;font-size:28px;font-weight:900;background:linear-gradient(90deg,var(--pride1),var(--pride2),var(--pride3),var(--pride4),var(--pride5),var(--pride6));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.loading-sub{font-size:13px;color:var(--text-dim)}
.loading-dots{display:flex;gap:6px}
.loading-dot{width:6px;height:6px;border-radius:50%;animation:bounce 1.4s infinite ease-in-out}
.loading-dot:nth-child(1){background:var(--pride1)}
.loading-dot:nth-child(2){background:var(--pride3);animation-delay:0.2s}
.loading-dot:nth-child(3){background:var(--pride5);animation-delay:0.4s}
@keyframes bounce{0%,80%,100%{transform:scale(0.6);opacity:0.4}40%{transform:scale(1);opacity:1}}
.tab-row{display:flex;gap:0;margin-bottom:20px;border-radius:10px;overflow:hidden;border:1px solid var(--border)}
.tab-btn{flex:1;padding:12px;border:none;cursor:pointer;font-family:'Unbounded',sans-serif;font-size:12px;font-weight:700;background:var(--surface2);color:var(--text-dim);transition:all 0.2s}
.tab-btn.active{background:linear-gradient(135deg,var(--pride5),var(--pride6));color:#fff}
.color-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:6px;flex-shrink:0}
@media(max-width:600px){
  .header{padding:8px 12px;gap:8px}
  .logo{font-size:12px}
  .timer-box{font-size:15px;padding:4px 10px;min-width:52px}
  .mult-badge{font-size:12px;padding:4px 8px}
  .card{padding:24px 20px;border-radius:16px}
  .card-logo{font-size:22px}
  .room-code-big{font-size:24px}
  .map-panel{position:fixed;bottom:0;left:0;right:0;width:100%!important;border-radius:16px 16px 0 0;transform:translateY(calc(100% - 48px));transition:transform 0.3s ease;z-index:100}
  .map-panel.open{transform:translateY(0)}
  .map-panel:hover{width:100%!important}
  #map{height:260px!important}
  .score-big{font-size:36px}
}
</style>
</head>
<body>

<div class="rainbow-line"></div>

<div class="header">
  <div class="logo">MinskGuessr</div>
  <div class="round-indicator" id="round-dots"></div>
  <div class="header-right">
    <div class="timer-wrap">
      <div class="timer-box t1" id="timer-box">0s</div>
      <div class="mult-badge m1" id="mult-badge">x1.0</div>
    </div>
    <div class="score-display">Очки: <span id="total-score">0</span></div>
  </div>
</div>

<div class="game-area">

  <div class="loading-screen" id="loading-screen">
    <div class="loading-logo">MinskGuessr</div>
    <div class="loading-sub" id="loading-sub">Загружаем...</div>
    <div class="loading-dots"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>
  </div>

  <div id="panorama"></div>
  <button id="reset-pano-btn" class="btn btn-secondary" onclick="resetPanorama()" style="position:absolute;top:14px;left:14px;z-index:50;font-size:11px;padding:8px 14px;background:rgba(255,255,255,0.92);backdrop-filter:blur(6px);box-shadow:0 2px 8px rgba(0,0,0,0.15);display:none">&#8617; На старт</button>

  <div class="players-guessed" id="players-guessed"></div>

  <div class="map-panel" id="map-panel" style="display:none">
    <div class="map-header" onclick="toggleMap()" id="map-header">
      <span>&#128205; Где это?</span>
      <span class="map-hint" id="map-hint">Кликни на карту</span>
    </div>
    <div id="map"></div>
    <div class="map-footer">
      <button class="btn btn-secondary" onclick="clearGuess()">&#10005;</button>
      <button class="btn btn-primary" id="guess-btn" disabled onclick="submitGuess()">Подтвердить &#8594;</button>
    </div>
  </div>

  <!-- MENU SCREEN -->
  <div class="overlay overlay-bg visible" id="menu-overlay">
    <div class="card">
      <div class="card-logo">MinskGuessr</div>
      <div style="font-family:'Unbounded',sans-serif;font-size:11px;color:var(--text-dim);margin-top:-2px;margin-bottom:6px;letter-spacing:1px;text-transform:uppercase">Мультиплеер</div>
      <div class="card-sub">Играй с друзьями — кто лучше знает Минск?</div>

      <div class="tab-row">
        <button class="tab-btn active" id="tab-create" onclick="switchTab('create')">Создать комнату</button>
        <button class="tab-btn" id="tab-join" onclick="switchTab('join')">Войти по коду</button>
      </div>

      <!-- CREATE TAB -->
      <div id="create-form">
        <div class="form-group">
          <label>Твой ник</label>
          <input class="form-input" id="create-nick" placeholder="Введи ник..." maxlength="16" value="">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Режим</label>
            <select class="form-input" id="create-mode">
              <option value="city">&#127961; Весь Минск</option>
              <option value="center">&#127919; Центр (1-е кольцо)</option>
            </select>
          </div>
          <div class="form-group">
            <label>Раунды</label>
            <select class="form-input" id="create-rounds">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="5" selected>5</option>
              <option value="7">7</option>
              <option value="10">10</option>
            </select>
          </div>
          <div class="form-group">
            <label>Игроки</label>
            <select class="form-input" id="create-players">
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4" selected>4</option>
              <option value="6">6</option>
              <option value="8">8</option>
            </select>
          </div>
        </div>
        <button class="btn btn-primary btn-lg" style="width:100%" onclick="createRoom()">Создать комнату</button>
      </div>

      <!-- JOIN TAB -->
      <div id="join-form" style="display:none">
        <div class="form-group">
          <label>Твой ник</label>
          <input class="form-input" id="join-nick" placeholder="Введи ник..." maxlength="16" value="">
        </div>
        <div class="form-group">
          <label>Код комнаты</label>
          <input class="form-input" id="join-code" placeholder="ABCDE" maxlength="5" style="font-family:'Unbounded',sans-serif;font-size:20px;text-align:center;letter-spacing:4px;text-transform:uppercase">
        </div>
        <div id="join-error" style="color:var(--red);font-size:12px;margin-bottom:12px;display:none"></div>
        <button class="btn btn-primary btn-lg" style="width:100%" onclick="joinRoom()">Войти</button>
      </div>
    </div>
  </div>

  <!-- LOBBY SCREEN -->
  <div class="overlay overlay-bg" id="lobby-overlay">
    <div class="card" style="text-align:center">
      <div class="card-logo">Комната</div>
      <div class="room-code-big" id="lobby-code"></div>
      <div style="display:flex;gap:8px;justify-content:center;margin-bottom:16px">
        <button class="btn btn-secondary" style="font-size:11px" onclick="copyRoomLink(this)">Скопировать ссылку</button>
      </div>
      <div style="font-size:12px;color:var(--text-dim);margin-bottom:4px" id="lobby-info"></div>
      <div class="player-list" id="lobby-players"></div>
      <button class="btn btn-primary btn-lg" style="width:100%;display:none" id="start-btn" onclick="sendStart()">&#9654; Начать игру</button>
      <div id="lobby-wait" style="font-size:12px;color:var(--text-dim);margin-top:12px">Ждём создателя...</div>
    </div>
  </div>

  <!-- ROUND RESULT SCREEN -->
  <div class="overlay overlay-bg" id="result-overlay">
    <div class="card" id="result-card" style="text-align:center">
      <div style="font-family:'Unbounded',sans-serif;font-size:12px;color:var(--text-dim);margin-bottom:8px" id="result-round-label"></div>
      <div class="result-map-container"><div id="result-map"></div></div>
      <table class="scoreboard" id="round-scoreboard">
        <thead><tr><th>#</th><th>Игрок</th><th>Расстояние</th><th>Время</th><th>Очки</th></tr></thead>
        <tbody id="round-scoreboard-body"></tbody>
      </table>
      <button class="btn btn-primary" style="width:100%;margin-top:12px;display:none" id="next-round-btn" onclick="sendNextRound()">Следующий раунд &#8594;</button>
      <div id="result-wait" style="font-size:12px;color:var(--text-dim);margin-top:12px">Ждём создателя...</div>
    </div>
  </div>

  <!-- COUNTDOWN SCREEN -->
  <div class="overlay overlay-bg" id="countdown-overlay">
    <div style="text-align:center">
      <div style="font-family:'Unbounded',sans-serif;font-size:14px;color:var(--text-dim);margin-bottom:16px">Игра начинается через</div>
      <div id="countdown-number" style="font-family:'Unbounded',sans-serif;font-size:96px;font-weight:900;background:linear-gradient(90deg,var(--pride1),var(--pride2),var(--pride3),var(--pride4),var(--pride5),var(--pride6));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1">5</div>
    </div>
  </div>

  <!-- FINAL SCREEN -->
  <div class="overlay overlay-bg" id="final-overlay">
    <div class="card" style="text-align:center;max-width:580px">
      <div style="font-family:'Unbounded',sans-serif;font-size:12px;color:var(--text-dim);margin-bottom:16px">ИТОГИ</div>
      <div id="podium" style="display:flex;align-items:flex-end;justify-content:center;gap:8px;margin-bottom:24px;min-height:180px"></div>
      <table class="scoreboard" id="final-scoreboard">
        <thead><tr><th>#</th><th>Игрок</th><th>Раунды</th><th>Итого</th></tr></thead>
        <tbody id="final-scoreboard-body"></tbody>
      </table>
      <button class="btn btn-primary btn-lg" style="width:100%;margin-top:16px" onclick="location.reload()">Новая игра</button>
    </div>
  </div>

</div>

<script src="https://api-maps.yandex.ru/2.1/?lang=ru_RU"></script>
<script>
var WS_URL = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/ws';

var ws = null;
var myNick = '';
var isCreator = false;
var roomCode = '';
var roomMode = 'city';
var timerInterval = null;
var timerSeconds = 0;
var myTotalScore = 0;
var guessCoords = null;
var guessMap = null;
var guessPlacemark = null;
var resultMap = null;
var panoPlayer = null;
var initialPanorama = null;
var currentLocation = null;
var totalRounds = 5;
var currentRound = 0;
var hasGuessed = false;
var playerColors = {};
var colorPalette = ['#ff3c5f','#0077ff','#00b86e','#ff8c00','#9b30ff','#f5c800','#00bcd4','#e91e63'];

// Check URL for room code
var urlParams = new URLSearchParams(window.location.search);
var urlRoom = urlParams.get('room');

function getTimerClass(s){if(s<=25)return 't1';if(s<=35)return 't2';if(s<=50)return 't3';return 't4';}
function getMultiplier(s){if(s<=25)return 1.0;if(s<=35)return 0.9;if(s<=50)return 0.8;if(s<=70)return 0.7;return 0;}
function getMultClass(s){if(s<=25)return 'm1';if(s<=35)return 'm09';if(s<=50)return 'm08';return 'm07';}

function startTimer(){
  stopTimer();timerSeconds=0;updateTimerUI();
  timerInterval=setInterval(function(){timerSeconds++;updateTimerUI();},1000);
}
function stopTimer(){if(timerInterval){clearInterval(timerInterval);timerInterval=null;}}
function updateTimerUI(){
  document.getElementById('timer-box').textContent=timerSeconds+'s';
  document.getElementById('timer-box').className='timer-box '+getTimerClass(timerSeconds);
  document.getElementById('mult-badge').textContent='x'+getMultiplier(timerSeconds).toFixed(1);
  document.getElementById('mult-badge').className='mult-badge '+getMultClass(timerSeconds);
}

function switchTab(tab){
  document.getElementById('tab-create').className='tab-btn'+(tab==='create'?' active':'');
  document.getElementById('tab-join').className='tab-btn'+(tab==='join'?' active':'');
  document.getElementById('create-form').style.display=tab==='create'?'block':'none';
  document.getElementById('join-form').style.display=tab==='join'?'block':'none';
}

function connectWS(onOpen){
  ws = new WebSocket(WS_URL);
  ws.onopen = function(){ if(onOpen) onOpen(); };
  ws.onmessage = function(e){ handleMessage(JSON.parse(e.data)); };
  ws.onclose = function(){ console.log('WS closed'); };
  ws.onerror = function(e){ console.error('WS error', e); };
}

function sendMsg(msg){ ws.send(JSON.stringify(msg)); }

function createRoom(){
  myNick = document.getElementById('create-nick').value.trim();
  if(!myNick){document.getElementById('create-nick').focus();return;}
  var mode = document.getElementById('create-mode').value;
  var rounds = parseInt(document.getElementById('create-rounds').value);
  var players = parseInt(document.getElementById('create-players').value);
  connectWS(function(){
    sendMsg({type:'create_room', nickname:myNick, mode:mode, num_rounds:rounds, max_players:players});
  });
}

function joinRoom(){
  myNick = document.getElementById('join-nick').value.trim();
  var code = document.getElementById('join-code').value.trim().toUpperCase();
  if(!myNick){document.getElementById('join-nick').focus();return;}
  if(!code||code.length<4){document.getElementById('join-code').focus();return;}
  connectWS(function(){
    sendMsg({type:'join_room', room_code:code, nickname:myNick});
  });
}

function handleMessage(msg){
  switch(msg.type){
    case 'room_created':
      roomCode = msg.room_code;
      isCreator = true;
      break;

    case 'lobby_update':
      roomCode = msg.room_code;
      roomMode = msg.mode;
      showLobby(msg);
      break;

    case 'countdown':
      hideAll();
      document.getElementById('countdown-overlay').classList.add('visible');
      document.getElementById('countdown-number').textContent = msg.seconds;
      break;

    case 'round_start':
      currentRound = msg.round_num;
      totalRounds = msg.total_rounds;
      currentLocation = msg.location;
      hasGuessed = false;
      showGame(msg);
      break;

    case 'player_guessed':
      updateGuessedChips(msg.nickname);
      break;

    case 'round_result':
      showRoundResult(msg);
      break;

    case 'game_over':
      showFinal(msg.leaderboard);
      break;

    case 'error':
      document.getElementById('join-error').textContent = msg.message;
      document.getElementById('join-error').style.display = 'block';
      break;
  }
}

function showLobby(msg){
  hideAll();
  document.getElementById('lobby-overlay').classList.add('visible');
  document.getElementById('lobby-code').textContent = roomCode;
  var modeLabel = msg.mode === 'center' ? 'Центр' : 'Весь Минск';
  document.getElementById('lobby-info').textContent = modeLabel + ' | ' + msg.num_rounds + ' раундов | до ' + msg.max_players + ' игроков';

  var html = '';
  var ci = 0;
  msg.players.forEach(function(p){
    if(!playerColors[p.nickname]) playerColors[p.nickname] = colorPalette[ci % colorPalette.length];
    ci++;
    html += '<div class="player-item"><span class="color-dot" style="background:'+playerColors[p.nickname]+'"></span><span class="nick">'+p.nickname+'</span>'+(p.is_creator?' <span class="crown">&#128081;</span>':'')+'</div>';
  });
  document.getElementById('lobby-players').innerHTML = html;

  if(isCreator){
    document.getElementById('start-btn').style.display = 'block';
    document.getElementById('lobby-wait').style.display = 'none';
  } else {
    document.getElementById('start-btn').style.display = 'none';
    document.getElementById('lobby-wait').style.display = 'block';
  }

  // Update URL
  history.replaceState(null, '', window.location.pathname + '?room=' + roomCode);
}

var guessedPlayers = [];

function showGame(msg){
  hideAll();
  document.getElementById('map-panel').style.display = 'block';
  document.getElementById('panorama').style.width = '100%';
  document.getElementById('panorama').style.height = '100%';
  document.getElementById('loading-screen').classList.remove('hidden');
  document.getElementById('loading-sub').textContent = 'Раунд ' + currentRound + '/' + totalRounds;
  clearGuess();
  stopTimer();
  guessedPlayers = [];
  updateGuessedChipsUI();
  buildRoundDots();
  updateRoundDots();

  if(guessMap){guessMap.setCenter([53.904,27.562]);guessMap.setZoom(10);}

  console.log('Locating panorama at', msg.location.lat, msg.location.lng);
  ymaps.panorama.locate([msg.location.lat, msg.location.lng]).done(function(panoramas){
    console.log('Panoramas found:', panoramas.length);
    if(!panoramas.length){
      document.getElementById('loading-screen').classList.add('hidden');
      document.getElementById('loading-sub').textContent = 'Панорама не найдена';
      startTimer();
      return;
    }
    if(panoPlayer){try{panoPlayer.destroy();}catch(e){}}
    document.getElementById('panorama').innerHTML = '';
    initialPanorama = panoramas[0];
    document.getElementById('reset-pano-btn').style.display = 'none';

    panoPlayer = new ymaps.panorama.Player('panorama', panoramas[0], {
      direction:[0,0], controls:['zoomControl'], suppressMapOpenBlock:true
    });
    panoPlayer.events.add('panoramachange', function(){
      document.getElementById('reset-pano-btn').style.display = 'block';
    });

    setTimeout(function(){document.getElementById('loading-screen').classList.add('hidden');},400);
    startTimer();
  }, function(err){
    console.error('Panorama locate error:', JSON.stringify(err), err.message, err);
    document.getElementById('loading-screen').classList.add('hidden');
    startTimer();
  });
}

function resetPanorama(){
  if(initialPanorama && panoPlayer){
    panoPlayer.setPanorama(initialPanorama);
    document.getElementById('reset-pano-btn').style.display = 'none';
  }
}

function updateGuessedChips(nickname){
  if(guessedPlayers.indexOf(nickname)===-1) guessedPlayers.push(nickname);
  updateGuessedChipsUI();
}

function updateGuessedChipsUI(){
  var el = document.getElementById('players-guessed');
  var html = '';
  guessedPlayers.forEach(function(n){
    html += '<div class="guessed-chip">'+n+' &#10003;</div>';
  });
  el.innerHTML = html;
}

function placeGuessMarker(coords){
  guessCoords = coords;
  if(guessPlacemark) guessMap.geoObjects.remove(guessPlacemark);
  guessPlacemark = new ymaps.Placemark(coords, {}, {preset:'islands#redCircleDotIcon'});
  guessMap.geoObjects.add(guessPlacemark);
  document.getElementById('guess-btn').disabled = false;
  document.getElementById('map-hint').textContent = 'Метка поставлена &#10003;';
  document.getElementById('map-hint').className = 'map-hint placed';
}

function clearGuess(){
  if(guessPlacemark && guessMap){guessMap.geoObjects.remove(guessPlacemark);guessPlacemark=null;}
  guessCoords = null;
  document.getElementById('guess-btn').disabled = true;
  document.getElementById('map-hint').textContent = 'Кликни на карту';
  document.getElementById('map-hint').className = 'map-hint';
}

function submitGuess(){
  if(!guessCoords || hasGuessed) return;
  hasGuessed = true;
  sendMsg({type:'submit_guess', lat:guessCoords[0], lng:guessCoords[1]});
  document.getElementById('guess-btn').disabled = true;
  document.getElementById('guess-btn').textContent = 'Ожидаем...';
  document.getElementById('map-hint').textContent = 'Ожидание других игроков...';
  document.getElementById('map-hint').className = 'map-hint';
  // Timer keeps running visually
}

function showRoundResult(msg){
  hideAll();
  document.getElementById('result-overlay').classList.add('visible');
  document.getElementById('result-round-label').textContent = 'Раунд ' + msg.round_num + '/' + totalRounds;

  // Result map
  if(resultMap){resultMap.destroy();resultMap=null;}
  var loc = msg.location;
  resultMap = new ymaps.Map('result-map', {center:[loc.lat,loc.lng], zoom:12, controls:[]});

  // Real location marker
  resultMap.geoObjects.add(new ymaps.Placemark([loc.lat,loc.lng], {}, {preset:'islands#greenCircleDotIcon'}));

  // Player guesses
  msg.results.forEach(function(r){
    if(r.guess_lat && !r.timed_out){
      var color = playerColors[r.nickname] || '#888';
      resultMap.geoObjects.add(new ymaps.Placemark([r.guess_lat, r.guess_lng], {iconCaption:r.nickname}, {
        iconColor: color,
        preset:'islands#circleDotIcon'
      }));
      resultMap.geoObjects.add(new ymaps.Polyline([[r.guess_lat,r.guess_lng],[loc.lat,loc.lng]], {}, {
        strokeColor:color, strokeWidth:2, strokeOpacity:0.5
      }));
    }
  });

  var bounds = resultMap.geoObjects.getBounds();
  if(bounds) resultMap.setBounds(bounds, {checkZoomRange:true, zoomMargin:30});

  // Scoreboard
  var tbody = document.getElementById('round-scoreboard-body');
  tbody.innerHTML = '';
  msg.results.forEach(function(r, i){
    var distText = r.timed_out ? 'Опоздал' : (r.distance < 1 ? Math.round(r.distance*1000)+' м' : r.distance.toFixed(2)+' км');
    var tr = document.createElement('tr');
    tr.innerHTML = '<td class="rank">'+(i+1)+'</td><td><span class="color-dot" style="background:'+(playerColors[r.nickname]||'#888')+'"></span>'+r.nickname+'</td><td>'+distText+'</td><td>'+r.time_sec+'s</td><td class="score-cell" style="color:'+(r.score>=3000?'var(--green)':r.score>=1000?'var(--orange)':'var(--red)')+'">'+r.score.toLocaleString('ru')+'</td>';
    tbody.appendChild(tr);

    // Update my total
    if(r.nickname === myNick) myTotalScore += r.score;
  });
  document.getElementById('total-score').textContent = myTotalScore.toLocaleString('ru');

  // Next round button
  if(isCreator && !msg.is_last_round){
    document.getElementById('next-round-btn').style.display = 'block';
    document.getElementById('result-wait').style.display = 'none';
  } else if(!msg.is_last_round) {
    document.getElementById('next-round-btn').style.display = 'none';
    document.getElementById('result-wait').style.display = 'block';
  } else {
    document.getElementById('next-round-btn').style.display = 'none';
    document.getElementById('result-wait').style.display = 'none';
  }
}

function showFinal(leaderboard){
  hideAll();
  document.getElementById('final-overlay').classList.add('visible');

  // Podium (top 3)
  var podium = document.getElementById('podium');
  podium.innerHTML = '';
  var podiumOrder = [1, 0, 2]; // 2nd, 1st, 3rd
  var podiumHeights = [120, 160, 90];
  var podiumColors = ['linear-gradient(180deg,#c0c0c0,#a8a8a8)', 'linear-gradient(180deg,#ffd700,#daa520)', 'linear-gradient(180deg,#cd7f32,#a0522d)'];
  var medals = ['\u{1F947}', '\u{1F948}', '\u{1F949}'];

  podiumOrder.forEach(function(idx){
    var p = leaderboard[idx];
    if(!p) return;
    var col = document.createElement('div');
    col.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:6px;';
    var nameEl = document.createElement('div');
    nameEl.style.cssText = 'font-family:Unbounded,sans-serif;font-size:12px;font-weight:700;color:var(--text);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';
    nameEl.textContent = p.nickname;
    var scoreEl = document.createElement('div');
    scoreEl.style.cssText = 'font-family:Unbounded,sans-serif;font-size:11px;color:var(--text-dim);';
    scoreEl.textContent = p.total_score.toLocaleString('ru');
    var bar = document.createElement('div');
    bar.style.cssText = 'width:80px;height:'+podiumHeights[idx]+'px;background:'+podiumColors[idx]+';border-radius:8px 8px 0 0;display:flex;align-items:flex-start;justify-content:center;padding-top:10px;';
    var medalEl = document.createElement('div');
    medalEl.style.cssText = 'font-size:28px;';
    medalEl.textContent = medals[idx];
    bar.appendChild(medalEl);
    col.appendChild(nameEl);
    col.appendChild(scoreEl);
    col.appendChild(bar);
    podium.appendChild(col);
  });

  // Scoreboard with per-round scores
  var tbody = document.getElementById('final-scoreboard-body');
  tbody.innerHTML = '';
  leaderboard.forEach(function(p, i){
    var tr = document.createElement('tr');
    var medal = i===0?'\u{1F947} ':i===1?'\u{1F948} ':i===2?'\u{1F949} ':'';
    var roundScores = p.scores.map(function(s){ return s.toLocaleString('ru'); }).join(' / ');
    tr.innerHTML = '<td class="rank">'+(i+1)+'</td><td><span class="color-dot" style="background:'+(playerColors[p.nickname]||'#888')+'"></span>'+medal+p.nickname+'</td><td style="font-size:11px;color:var(--text-dim)">'+roundScores+'</td><td class="score-cell" style="color:var(--pride5)">'+p.total_score.toLocaleString('ru')+'</td>';
    tbody.appendChild(tr);
  });
}

function sendStart(){ sendMsg({type:'start_game'}); }
function sendNextRound(){ sendMsg({type:'next_round'}); }

function copyRoomLink(btn){
  var url = window.location.origin + '/?room=' + roomCode;
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(function(){
      btn.textContent = 'Скопировано!';
      setTimeout(function(){ btn.textContent = 'Скопировать ссылку'; }, 2000);
    }).catch(function(){ fallbackCopy(url, btn); });
  } else { fallbackCopy(url, btn); }
}
function fallbackCopy(text, btn){
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  btn.textContent = 'Скопировано!';
  setTimeout(function(){ btn.textContent = 'Скопировать ссылку'; }, 2000);
}

function hideAll(){
  ['menu-overlay','lobby-overlay','result-overlay','final-overlay','countdown-overlay'].forEach(function(id){
    document.getElementById(id).classList.remove('visible');
  });
  document.getElementById('map-panel').style.display = 'none';
  document.getElementById('players-guessed').innerHTML = '';
}

function toggleMap(){
  var p=document.getElementById('map-panel');
  if(window.innerWidth<=600) p.classList.toggle('open');
}

function buildRoundDots(){
  var c=document.getElementById('round-dots');c.innerHTML='';
  for(var i=0;i<totalRounds;i++){var d=document.createElement('div');d.className='round-dot'+(i===currentRound-1?' active':'');d.id='dot-'+i;c.appendChild(d);}
}
function updateRoundDots(){
  for(var i=0;i<totalRounds;i++){var d=document.getElementById('dot-'+i);if(!d)continue;d.className='round-dot';if(i<currentRound-1)d.classList.add('done');else if(i===currentRound-1)d.classList.add('active');}
}

ymaps.ready(function(){
  guessMap = new ymaps.Map('map', {center:[53.904,27.562], zoom:10, controls:['zoomControl']});
  guessMap.events.add('click', function(e){ if(!hasGuessed) placeGuessMarker(e.get('coords')); });

  var mapPanel = document.getElementById('map-panel');
  mapPanel.addEventListener('mouseenter', function(){setTimeout(function(){guessMap.container.fitToViewport();},300);});
  mapPanel.addEventListener('mouseleave', function(){setTimeout(function(){guessMap.container.fitToViewport();},300);});

  document.getElementById('loading-screen').classList.add('hidden');

  // Auto-join if room code in URL
  if(urlRoom){
    switchTab('join');
    document.getElementById('join-code').value = urlRoom;
  }
});
</script>
